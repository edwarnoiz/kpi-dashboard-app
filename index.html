<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau de bord KPI Marketing</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f4f1; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 1.75rem;
    }
    .header-left h1 { font-size: 22px; font-weight: 500; }
    .header-left p  { font-size: 13px; color: #6b6b67; margin-top: 3px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .live-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: #2d6e12; background: #eaf3de;
      border-radius: 20px; padding: 3px 10px;
    }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #3B6D11; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .error-badge {
      display: none; align-items: center; gap: 5px;
      font-size: 11px; color: #9e2a2a; background: #fcebeb;
      border-radius: 20px; padding: 3px 10px;
    }
    .last-updated { font-size: 11px; color: #aaa; background: #f0f0ec; border-radius: 20px; padding: 3px 10px; }
    .refresh-btn {
      padding: 7px 14px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2);
      background: #fff; font-size: 13px; cursor: pointer; color: #444;
    }
    .refresh-btn:hover { background: #f0f0ec; }
    .period-select {
      font-size: 13px; padding: 7px 12px; border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.25); background: #fff; color: #444; cursor: pointer;
    }
    .api-banner {
      background: #e8f4fb; border: 0.5px solid #7ab8d9; border-radius: 10px;
      padding: 12px 16px; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .api-banner span { font-size: 13px; color: #1a4f6e; flex: 1; min-width: 200px; }
    .api-banner a { color: #1a6ea8; }
    .api-banner input {
      flex: 2; min-width: 200px; padding: 7px 10px;
      border-radius: 7px; border: 0.5px solid #ccc; font-size: 13px; font-family: monospace;
    }
    .api-banner button {
      padding: 7px 14px; border-radius: 7px; border: 0.5px solid rgba(0,0,0,0.2);
      background: #fff; font-size: 13px; cursor: pointer;
    }
    .api-banner button:hover { background: #f0f0ec; }
    .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .tab {
      padding: 7px 16px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2);
      background: transparent; cursor: pointer; font-size: 13px; font-weight: 500;
      color: #666; transition: all 0.15s;
    }
    .tab.active { background: #fff; color: #1a1a18; border-color: rgba(0,0,0,0.35); }
    .tab:hover:not(.active) { background: rgba(0,0,0,0.04); }
    .metrics-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px; margin-bottom: 1.25rem;
    }
    .metric-card {
      background: #fff; border-radius: 10px;
      border: 0.5px solid rgba(0,0,0,0.1); padding: 14px 16px;
    }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 5px; }
    .metric-value { font-size: 22px; font-weight: 500; color: #1a1a18; }
    .metric-trend { font-size: 12px; margin-top: 5px; }
    .trend-up   { color: #2d6e12; }
    .trend-down { color: #9e2a2a; }
    .metric-source { font-size: 10px; color: #bbb; margin-top: 3px; }
    .chart-card {
      background: #fff; border-radius: 12px;
      border: 0.5px solid rgba(0,0,0,0.1); padding: 1.25rem; margin-bottom: 1.25rem;
    }
    .chart-title { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 14px; }
    .ai-card {
      background: #fff; border-radius: 12px;
      border: 0.5px solid rgba(0,0,0,0.1); padding: 1.25rem;
    }
    .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: #4285f4; }
    .ai-header-title { font-size: 14px; font-weight: 500; color: #1a1a18; }
    .spinner {
      display: none; width: 13px; height: 13px;
      border: 2px solid #ddd; border-top-color: #4285f4;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ai-output {
      font-size: 13px; color: #555; line-height: 1.75;
      min-height: 48px; margin-bottom: 14px; white-space: pre-wrap;
    }
    .ai-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .ai-btn {
      padding: 7px 14px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2);
      background: #f8f8f5; cursor: pointer; font-size: 12px; color: #444;
    }
    .ai-btn:hover    { background: #eeede8; }
    .ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading-overlay {
      text-align: center; padding: 2rem; font-size: 13px; color: #aaa;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #e8e8e4; }
      .header-left h1, .metric-value { color: #e8e8e4; }
      .header-left p, .metric-label, .chart-title, .ai-header-title { color: #aaa; }
      .metric-card, .chart-card, .ai-card { background: #2a2a28; border-color: rgba(255,255,255,0.1); }
      .tab { color: #aaa; border-color: rgba(255,255,255,0.2); }
      .tab.active { background: #3a3a38; color: #e8e8e4; border-color: rgba(255,255,255,0.35); }
      .tab:hover:not(.active) { background: rgba(255,255,255,0.05); }
      .period-select, .refresh-btn { background: #2a2a28; color: #ccc; border-color: rgba(255,255,255,0.2); }
      .ai-output { color: #ccc; }
      .ai-btn { background: #333330; color: #ccc; border-color: rgba(255,255,255,0.15); }
      .ai-btn:hover { background: #3e3e3a; }
      .api-banner { background: #0d2a3a; border-color: #1a5a7a; }
      .api-banner span { color: #7ab8d9; }
      .api-banner input { background: #1a1a18; color: #e8e8e4; border-color: #555; }
      .api-banner button { background: #333; color: #ccc; border-color: #555; }
      .last-updated { background: #2a2a28; color: #666; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-left">
      <h1>Tableau de bord KPI</h1>
      <p>Infolettre · LinkedIn · Site web</p>
    </div>
    <div class="header-right">
      <span class="live-badge" id="liveBadge" style="display:none"><span class="live-dot"></span> Google Sheet live</span>
      <span class="error-badge" id="errorBadge">⚠ Données hors ligne</span>
      <span class="last-updated" id="lastUpdated"></span>
      <button class="refresh-btn" onclick="loadSheet()">↻ Actualiser</button>
      <select class="period-select" id="periodSelect" onchange="renderAll()">
        <option value="4">4 semaines</option>
        <option value="8" selected>8 semaines</option>
        <option value="12">12 semaines</option>
      </select>
    </div>
  </div>

  <div class="api-banner">
    <span>Clé API Google Gemini (gratuit) —
      <a href="https://aistudio.google.com/app/apikey" target="_blank">Obtenir ma clé</a>
    </span>
    <input type="password" id="apiKeyInput" placeholder="AIza..." />
    <button onclick="saveGeminiKey()">Enregistrer</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('all',        this)">Vue d'ensemble</button>
    <button class="tab"        onclick="switchTab('newsletter', this)">Infolettre</button>
    <button class="tab"        onclick="switchTab('linkedin',   this)">LinkedIn</button>
    <button class="tab"        onclick="switchTab('website',    this)">Site web</button>
  </div>

  <div id="metricsGrid" class="metrics-grid"></div>

  <div class="chart-card">
    <div class="chart-title" id="chartTitle">Évolution</div>
    <div style="position:relative;width:100%;height:220px;">
      <canvas id="mainChart" role="img" aria-label="Graphique d'évolution des KPI"></canvas>
    </div>
  </div>

  <div class="ai-card">
    <div class="ai-header">
      <div class="ai-dot"></div>
      <span class="ai-header-title">Analyse IA — Gemini</span>
      <div class="spinner" id="aiSpinner"></div>
    </div>
    <div class="ai-output" id="aiOutput">Enregistre ta clé Gemini puis clique sur un bouton pour générer une analyse.</div>
    <div class="ai-buttons">
      <button class="ai-btn" onclick="analyzeKPIs('résume')">Résumé de performance ↗</button>
      <button class="ai-btn" onclick="analyzeKPIs('anomalie')">Détecter anomalies ↗</button>
      <button class="ai-btn" onclick="analyzeKPIs('recommandations')">Recommandations ↗</button>
      <button class="ai-btn" onclick="analyzeKPIs('objectifs')">Proposer objectifs ↗</button>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════
   CONFIG — ne change que l'ID du Sheet si nécessaire
   ═══════════════════════════════════════════ */
const SHEET_ID  = "1L0OGIG21FQr5yC9FgeL1a4ln8_PbnT0LtXcE-K_yqFc";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

/* ═══════════════════════════════════════════
   État
   ═══════════════════════════════════════════ */
let rows       = [];   // toutes les lignes du Sheet
let currentTab = "all";
let chart      = null;
let geminiKey  = "";

/* ═══════════════════════════════════════════
   Chargement Google Sheet
   ═══════════════════════════════════════════ */
async function loadSheet() {
  try {
    const res  = await fetch(SHEET_URL);
    const text = await res.text();
    rows = parseCSV(text);

    document.getElementById("liveBadge").style.display  = "inline-flex";
    document.getElementById("errorBadge").style.display = "none";

    const last = rows[rows.length - 1];
    document.getElementById("lastUpdated").textContent = "Mis à jour le " + last.Date;

    renderAll();
  } catch(e) {
    document.getElementById("liveBadge").style.display  = "none";
    document.getElementById("errorBadge").style.display = "inline-flex";
    console.error("Erreur Sheet:", e);
  }
}

/* ═══════════════════════════════════════════
   Parser CSV simple
   ═══════════════════════════════════════════ */
function parseCSV(text) {
  const lines  = text.trim().split("\n");
  const headers= lines[0].split(",").map(h => h.replace(/"/g,"").trim());
  return lines.slice(1).map(line => {
    const vals = line.split(",").map(v => v.replace(/"/g,"").trim());
    const obj  = {};
    headers.forEach((h, i) => obj[h] = vals[i] || "0");
    return obj;
  });
}

/* ═══════════════════════════════════════════
   Calcul tendance (dernière vs avant-dernière semaine)
   ═══════════════════════════════════════════ */
function trend(current, previous, isPercent) {
  const diff = parseFloat(current) - parseFloat(previous);
  const sign = diff >= 0 ? "+" : "";
  return isPercent ? `${sign}${diff.toFixed(1)}%` : `${sign}${diff.toFixed(1)}`;
}
function trendUp(current, previous, invertedIsGood) {
  const diff = parseFloat(current) - parseFloat(previous);
  return invertedIsGood ? diff <= 0 : diff >= 0;
}

/* ═══════════════════════════════════════════
   Données selon l'onglet
   ═══════════════════════════════════════════ */
function getMetrics(tab) {
  if (!rows.length) return [];
  const last = rows[rows.length - 1];
  const prev = rows.length > 1 ? rows[rows.length - 2] : last;

  if (tab === "newsletter") return [
    { label: "Taux d'ouverture", value: last.Ouverture + "%", trend: trend(last.Ouverture, prev.Ouverture, true),  up: trendUp(last.Ouverture, prev.Ouverture, false), source: "Mailchimp" },
    { label: "Taux de clic",     value: last.Clics + "%",     trend: trend(last.Clics,     prev.Clics,     true),  up: trendUp(last.Clics,     prev.Clics,     false), source: "Mailchimp" },
    { label: "Désabonnements",   value: last.Desabo + "%",    trend: trend(last.Desabo,    prev.Desabo,    true),  up: trendUp(last.Desabo,    prev.Desabo,    true),  source: "Mailchimp" },
    { label: "Abonnés actifs",   value: parseInt(last.Abonnes).toLocaleString("fr-CA"), trend: trend(last.Abonnes, prev.Abonnes, false), up: trendUp(last.Abonnes, prev.Abonnes, false), source: "Mailchimp" },
  ];

  if (tab === "linkedin") return [
    { label: "Impressions",       value: parseInt(last.Impressions).toLocaleString("fr-CA"), trend: trend(last.Impressions,  prev.Impressions,  false), up: trendUp(last.Impressions,  prev.Impressions,  false), source: "LinkedIn" },
    { label: "Taux d'engagement", value: last.Engagement + "%", trend: trend(last.Engagement, prev.Engagement, true), up: trendUp(last.Engagement, prev.Engagement, false), source: "LinkedIn" },
    { label: "Nouveaux abonnés",  value: last.NouveauxLK,       trend: trend(last.NouveauxLK, prev.NouveauxLK, false), up: trendUp(last.NouveauxLK, prev.NouveauxLK, false), source: "LinkedIn" },
    { label: "Partages",          value: last.Partages,          trend: trend(last.Partages,   prev.Partages,   false), up: trendUp(last.Partages,   prev.Partages,   false), source: "LinkedIn" },
  ];

  if (tab === "website") return [
    { label: "Sessions",        value: parseInt(last.Sessions).toLocaleString("fr-CA"), trend: trend(last.Sessions,     prev.Sessions,     false), up: trendUp(last.Sessions,     prev.Sessions,     false), source: "Google Analytics" },
    { label: "Pages / session", value: last.PagesSession, trend: trend(last.PagesSession, prev.PagesSession, false), up: trendUp(last.PagesSession, prev.PagesSession, false), source: "Google Analytics" },
    { label: "Taux de rebond",  value: last.Rebond + "%", trend: trend(last.Rebond,       prev.Rebond,       true),  up: trendUp(last.Rebond,       prev.Rebond,       true),  source: "Google Analytics" },
    { label: "Durée moy.",      value: Math.floor(last.Duree/60) + "m " + (last.Duree%60) + "s", trend: trend(last.Duree, prev.Duree, false) + "s", up: trendUp(last.Duree, prev.Duree, false), source: "Google Analytics" },
  ];

  // Vue d'ensemble
  return [
    { label: "Taux d'ouverture", value: last.Ouverture + "%", trend: trend(last.Ouverture, prev.Ouverture, true), up: trendUp(last.Ouverture, prev.Ouverture, false), source: "Infolettre" },
    { label: "Abonnés LinkedIn", value: parseInt(last.Impressions).toLocaleString("fr-CA"), trend: trend(last.Impressions, prev.Impressions, false), up: trendUp(last.Impressions, prev.Impressions, false), source: "LinkedIn" },
    { label: "Sessions web",     value: parseInt(last.Sessions).toLocaleString("fr-CA"), trend: trend(last.Sessions, prev.Sessions, false), up: trendUp(last.Sessions, prev.Sessions, false), source: "Site web" },
    { label: "Abonnés actifs",   value: parseInt(last.Abonnes).toLocaleString("fr-CA"), trend: trend(last.Abonnes, prev.Abonnes, false), up: trendUp(last.Abonnes, prev.Abonnes, false), source: "Infolettre" },
  ];
}

/* ═══════════════════════════════════════════
   Données graphique selon l'onglet
   ═══════════════════════════════════════════ */
function getChartData(tab, period) {
  const slice  = rows.slice(-period);
  const labels = slice.map(r => r.Date);
  const configs = {
    newsletter: { key: "Ouverture",   label: "Taux d'ouverture (%)", color: "#0F6E56" },
    linkedin:   { key: "Impressions", label: "Impressions",           color: "#534AB7" },
    website:    { key: "Sessions",    label: "Sessions",              color: "#BA7517" },
    all:        { key: "Ouverture",   label: "Taux d'ouverture (%)", color: "#3266ad" },
  };
  const cfg  = configs[tab];
  const data = slice.map(r => parseFloat(r[cfg.key]));
  return { labels, data, label: cfg.label, color: cfg.color };
}

/* ═══════════════════════════════════════════
   Rendu métriques
   ═══════════════════════════════════════════ */
function renderMetrics(tab) {
  const grid    = document.getElementById("metricsGrid");
  const metrics = getMetrics(tab);
  if (!metrics.length) {
    grid.innerHTML = `<div class="loading-overlay">Chargement des données...</div>`;
    return;
  }
  grid.innerHTML = "";
  metrics.forEach(m => {
    const cls   = m.up ? "trend-up" : "trend-down";
    const arrow = m.up ? "↑" : "↓";
    const src   = m.source ? `<div class="metric-source">${m.source}</div>` : "";
    grid.innerHTML += `
      <div class="metric-card">
        <div class="metric-label">${m.label}</div>
        <div class="metric-value">${m.value}</div>
        <div class="metric-trend ${cls}">${arrow} ${m.trend}</div>
        ${src}
      </div>`;
  });
}

/* ═══════════════════════════════════════════
   Rendu graphique
   ═══════════════════════════════════════════ */
function renderChart(tab, period) {
  if (!rows.length) return;
  const { labels, data, label, color } = getChartData(tab, period);
  document.getElementById("chartTitle").textContent = `${label} — ${period} dernières semaines`;
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("mainChart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label,
        data,
        borderColor: color,
        backgroundColor: color + "18",
        borderWidth: 1.5,
        tension: 0.4,
        fill: true,
        pointRadius: 4,
        pointHoverRadius: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 11 }, color: "#888", maxTicksLimit: 8 }, grid: { display: false } },
        y: { ticks: { font: { size: 11 }, color: "#888" }, grid: { color: "rgba(128,128,128,0.1)" } }
      }
    }
  });
}

/* ═══════════════════════════════════════════
   Navigation
   ═══════════════════════════════════════════ */
function renderAll() {
  const period = parseInt(document.getElementById("periodSelect").value);
  renderMetrics(currentTab);
  renderChart(currentTab, period);
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  renderAll();
  document.getElementById("aiOutput").textContent = "Clique sur un bouton pour analyser ce canal.";
}

/* ═══════════════════════════════════════════
   Clé Gemini
   ═══════════════════════════════════════════ */
function saveGeminiKey() {
  geminiKey = document.getElementById("apiKeyInput").value.trim();
  if (geminiKey) {
    document.getElementById("aiOutput").textContent = "Clé Gemini enregistrée ! Clique sur un bouton pour analyser tes KPI.";
    document.getElementById("apiKeyInput").value = "••••••••••••••••";
  }
}

/* ═══════════════════════════════════════════
   Analyse IA — Google Gemini
   ═══════════════════════════════════════════ */
async function analyzeKPIs(type) {
  if (!geminiKey) {
    document.getElementById("aiOutput").textContent = "⚠️ Enregistre d'abord ta clé API Gemini ci-dessus.";
    return;
  }
  const metrics  = getMetrics(currentTab).map(m => `${m.label}: ${m.value} (${m.trend})`).join(", ");
  const tabLabel = { all: "vue d'ensemble", newsletter: "infolettre", linkedin: "LinkedIn", website: "site web" }[currentTab];
  const prompts  = {
    résume:          `Tu es un analyste marketing. Résume en 3 phrases claires la performance de ce canal (${tabLabel}) basée sur ces KPI : ${metrics}. Sois direct et concis.`,
    anomalie:        `Tu es un analyste marketing. Identifie toute anomalie ou métrique préoccupante dans ces KPI (${tabLabel}) : ${metrics}. Explique brièvement en 2-3 phrases.`,
    recommandations: `Tu es un stratège marketing. Donne 3 recommandations concrètes et actionnables pour améliorer la performance de ce canal (${tabLabel}), basées sur ces KPI : ${metrics}.`,
    objectifs:       `Tu es un coach marketing. Propose des objectifs SMART réalistes pour le prochain mois pour ce canal (${tabLabel}), basé sur les métriques actuelles : ${metrics}.`,
  };
  const out     = document.getElementById("aiOutput");
  const spinner = document.getElementById("aiSpinner");
  const btns    = document.querySelectorAll(".ai-btn");
  out.textContent = "";
  spinner.style.display = "inline-block";
  btns.forEach(b => b.disabled = true);
  try {
    const res  = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,
      { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompts[type] }] }] }) }
    );
    const data = await res.json();
    spinner.style.display = "none";
    btns.forEach(b => b.disabled = false);
    if (data.error) { out.textContent = "Erreur API : " + data.error.message; return; }
    out.textContent = data.candidates?.[0]?.content?.parts?.[0]?.text || "Aucune réponse reçue.";
  } catch(e) {
    spinner.style.display = "none";
    btns.forEach(b => b.disabled = false);
    out.textContent = "Erreur de connexion. Vérifie ta clé API et ta connexion internet.";
  }
}

/* ═══════════════════════════════════════════
   Init
   ═══════════════════════════════════════════ */
loadSheet();
</script>
</body>
</html>
