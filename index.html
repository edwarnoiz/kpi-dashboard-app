<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau de bord KPI Marketing</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f4f1; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 1.75rem;
    }
    .header-left h1 { font-size: 22px; font-weight: 500; }
    .header-left p  { font-size: 13px; color: #6b6b67; margin-top: 3px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .period-select {
      font-size: 13px; padding: 7px 12px; border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.25); background: #fff; color: #444; cursor: pointer;
    }
    .last-updated {
      font-size: 11px; color: #aaa;
      background: #f0f0ec; border-radius: 20px; padding: 3px 10px;
    }
    .api-banner {
      background: #e8f4fb; border: 0.5px solid #7ab8d9; border-radius: 10px;
      padding: 12px 16px; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .api-banner span { font-size: 13px; color: #1a4f6e; flex: 1; min-width: 200px; }
    .api-banner a { color: #1a6ea8; }
    .api-banner input {
      flex: 2; min-width: 200px; padding: 7px 10px;
      border-radius: 7px; border: 0.5px solid #ccc; font-size: 13px; font-family: monospace;
    }
    .api-banner button {
      padding: 7px 14px; border-radius: 7px; border: 0.5px solid rgba(0,0,0,0.2);
      background: #fff; font-size: 13px; cursor: pointer;
    }
    .api-banner button:hover { background: #f0f0ec; }
    .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .tab {
      padding: 7px 16px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2);
      background: transparent; cursor: pointer; font-size: 13px; font-weight: 500;
      color: #666; transition: all 0.15s;
    }
    .tab.active { background: #fff; color: #1a1a18; border-color: rgba(0,0,0,0.35); }
    .tab:hover:not(.active) { background: rgba(0,0,0,0.04); }
    .metrics-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px; margin-bottom: 1.25rem;
    }
    .metric-card {
      background: #fff; border-radius: 10px;
      border: 0.5px solid rgba(0,0,0,0.1); padding: 14px 16px;
    }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 5px; }
    .metric-value { font-size: 22px; font-weight: 500; color: #1a1a18; }
    .metric-trend { font-size: 12px; margin-top: 5px; }
    .trend-up   { color: #2d6e12; }
    .trend-down { color: #9e2a2a; }
    .metric-source { font-size: 10px; color: #bbb; margin-top: 3px; }
    .chart-card {
      background: #fff; border-radius: 12px;
      border: 0.5px solid rgba(0,0,0,0.1); padding: 1.25rem; margin-bottom: 1.25rem;
    }
    .chart-title { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 14px; }
    .ai-card {
      background: #fff; border-radius: 12px;
      border: 0.5px solid rgba(0,0,0,0.1); padding: 1.25rem;
    }
    .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: #4285f4; }
    .ai-header-title { font-size: 14px; font-weight: 500; color: #1a1a18; }
    .spinner {
      display: none; width: 13px; height: 13px;
      border: 2px solid #ddd; border-top-color: #4285f4;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ai-output {
      font-size: 13px; color: #555; line-height: 1.75;
      min-height: 48px; margin-bottom: 14px; white-space: pre-wrap;
    }
    .ai-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .ai-btn {
      padding: 7px 14px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2);
      background: #f8f8f5; cursor: pointer; font-size: 12px; color: #444;
    }
    .ai-btn:hover    { background: #eeede8; }
    .ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #e8e8e4; }
      .header-left h1, .metric-value { color: #e8e8e4; }
      .header-left p, .metric-label, .chart-title, .ai-header-title { color: #aaa; }
      .metric-card, .chart-card, .ai-card { background: #2a2a28; border-color: rgba(255,255,255,0.1); }
      .tab { color: #aaa; border-color: rgba(255,255,255,0.2); }
      .tab.active { background: #3a3a38; color: #e8e8e4; border-color: rgba(255,255,255,0.35); }
      .tab:hover:not(.active) { background: rgba(255,255,255,0.05); }
      .period-select { background: #2a2a28; color: #ccc; border-color: rgba(255,255,255,0.2); }
      .ai-output { color: #ccc; }
      .ai-btn { background: #333330; color: #ccc; border-color: rgba(255,255,255,0.15); }
      .ai-btn:hover { background: #3e3e3a; }
      .api-banner { background: #0d2a3a; border-color: #1a5a7a; }
      .api-banner span { color: #7ab8d9; }
      .api-banner input { background: #1a1a18; color: #e8e8e4; border-color: #555; }
      .api-banner button { background: #333; color: #ccc; border-color: #555; }
      .last-updated { background: #2a2a28; color: #666; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-left">
      <h1>Tableau de bord KPI</h1>
      <p>Infolettre · LinkedIn · Site web</p>
    </div>
    <div class="header-right">
      <span class="last-updated" id="lastUpdated"></span>
      <select class="period-select" id="periodSelect" onchange="updatePeriod(this.value)">
        <option value="7">7 derniers jours</option>
        <option value="30" selected>30 derniers jours</option>
        <option value="90">3 derniers mois</option>
      </select>
    </div>
  </div>

  <div class="api-banner">
    <span>Clé API Google Gemini (gratuit) —
      <a href="https://aistudio.google.com/app/apikey" target="_blank">Obtenir ma clé</a>
    </span>
    <input type="password" id="apiKeyInput" placeholder="AIza..." />
    <button onclick="saveGeminiKey()">Enregistrer</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('all',        this)">Vue d'ensemble</button>
    <button class="tab"        onclick="switchTab('newsletter', this)">Infolettre</button>
    <button class="tab"        onclick="switchTab('linkedin',   this)">LinkedIn</button>
    <button class="tab"        onclick="switchTab('website',    this)">Site web</button>
  </div>

  <div class="metrics-grid" id="metricsGrid"></div>

  <div class="chart-card">
    <div class="chart-title" id="chartTitle">Évolution sur 30 jours</div>
    <div style="position: relative; width: 100%; height: 220px;">
      <canvas id="mainChart" role="img" aria-label="Graphique d'évolution des KPI"></canvas>
    </div>
  </div>

  <div class="ai-card">
    <div class="ai-header">
      <div class="ai-dot"></div>
      <span class="ai-header-title">Analyse IA — Gemini</span>
      <div class="spinner" id="aiSpinner"></div>
    </div>
    <div class="ai-output" id="aiOutput">Enregistre ta clé Gemini puis clique sur un bouton pour générer une analyse.</div>
    <div class="ai-buttons">
      <button class="ai-btn" onclick="analyzeKPIs('résume')">Résumé de performance ↗</button>
      <button class="ai-btn" onclick="analyzeKPIs('anomalie')">Détecter anomalies ↗</button>
      <button class="ai-btn" onclick="analyzeKPIs('recommandations')">Recommandations ↗</button>
      <button class="ai-btn" onclick="analyzeKPIs('objectifs')">Proposer objectifs ↗</button>
    </div>
  </div>

</div>
<script>
/* ╔═══════════════════════════════════════════════════════════════╗
   ║  MISE À JOUR HEBDOMADAIRE — modifie uniquement cette section  ║
   ║  Chaque lundi, copie tes chiffres ici et fais un commit       ║
   ╚═══════════════════════════════════════════════════════════════╝ */

const DERNIERE_MISE_A_JOUR = "28 avril 2026"; // ← change la date ici

const DATA = {

  /* ── INFOLETTRE (Mailchimp) ──────────────────────────────────── */
  newsletter: {
    metrics: [
      { label: "Taux d'ouverture", value: "42.3%", trend: "+3.1%",  up: true  },
      { label: "Taux de clic",     value: "6.7%",   trend: "+1.2%",  up: true  },
      { label: "Désabonnements",   value: "0.4%",   trend: "-0.1%",  up: true  },
      { label: "Abonnés actifs",   value: "3 412",  trend: "+5.8%",  up: true  },
    ],
    chartLabel: "Taux d'ouverture (%)",
    // 90 valeurs = 3 mois de données quotidiennes (du plus ancien au plus récent)
    chartData: [38,39,40,38,41,42,40,43,41,44,42,43,41,44,43,45,43,44,42,45,44,46,44,45,43,44,42,44,43,42,
                36,37,38,36,39,40,38,41,39,42,40,41,39,42,41,43,41,42,40,43,42,44,42,43,41,42,40,42,41,40,
                34,35,36,34,37,38,36,39,37,40,38,39,41,40,42,41,43,42,44,43,45,44,46,45,44,43,42,43,44,45],
    chartColor: "#0F6E56",
  },

  /* ── LINKEDIN ────────────────────────────────────────────────── */
  linkedin: {
    metrics: [
      { label: "Impressions",       value: "24 580", trend: "+18.2%", up: true  },
      { label: "Taux d'engagement", value: "4.2%",   trend: "+0.9%",  up: true  },
      { label: "Nouveaux abonnés",  value: "127",    trend: "+22.1%", up: true  },
      { label: "Partages",          value: "89",     trend: "-5.3%",  up: false },
    ],
    chartLabel: "Impressions (milliers)",
    chartData: [0.6,0.7,0.8,0.9,0.8,1.0,1.1,0.9,1.2,1.1,1.3,1.2,1.4,1.3,1.5,1.4,1.6,1.5,1.7,1.6,1.8,1.7,1.9,1.8,2.0,1.9,2.1,2.0,2.2,2.1,
                0.5,0.6,0.7,0.8,0.7,0.9,1.0,0.8,1.1,1.0,1.2,1.1,1.3,1.2,1.4,1.3,1.5,1.4,1.6,1.5,1.7,1.6,1.8,1.7,1.9,1.8,2.0,1.9,2.1,2.0,
                0.4,0.5,0.6,0.7,0.6,0.8,0.9,0.7,1.0,0.9,1.1,1.0,1.2,1.1,1.3,1.4,1.5,1.6,1.7,1.8,1.9,2.0,2.1,2.2,2.3,2.2,2.1,2.2,2.3,2.4],
    chartColor: "#534AB7",
  },

  /* ── SITE WEB (Google Analytics) ────────────────────────────── */
  website: {
    metrics: [
      { label: "Sessions",        value: "8 204",  trend: "-2.1%",  up: false },
      { label: "Pages / session", value: "2.4",    trend: "+0.2",   up: true  },
      { label: "Taux de rebond",  value: "54%",    trend: "-3.2%",  up: true  },
      { label: "Durée moy.",      value: "2m 38s", trend: "+12s",   up: true  },
    ],
    chartLabel: "Sessions (journalières)",
    chartData: [280,310,295,320,305,290,315,330,310,295,280,310,325,340,315,300,285,310,295,320,335,310,295,280,305,320,295,310,285,295,
                260,290,275,300,285,270,295,310,290,275,260,290,305,320,295,280,265,290,275,300,315,290,275,260,285,300,275,290,265,275,
                240,270,255,280,265,250,275,290,270,255,240,270,285,300,275,260,275,290,305,320,295,280,265,280,295,310,285,270,285,300],
    chartColor: "#BA7517",
  },

};

/* ╔═══════════════════════════════════════════════════════════════╗
   ║  FIN DE LA SECTION À MODIFIER — ne touche pas au reste        ║
   ╚═══════════════════════════════════════════════════════════════╝ */

// Vue d'ensemble = première métrique de chaque canal
DATA.all = {
  metrics: [
    { ...DATA.newsletter.metrics[0], source: "Infolettre" },
    { ...DATA.linkedin.metrics[0],   source: "LinkedIn"   },
    { ...DATA.website.metrics[0],    source: "Site web"   },
    { ...DATA.newsletter.metrics[3], source: "Infolettre" },
  ],
  chartLabel: "Indice global (normalisé)",
  chartData: DATA.newsletter.chartData.map((v, i) =>
    Math.round((v / 50 + DATA.linkedin.chartData[i] / 2.5 + DATA.website.chartData[i] / 350) / 3 * 100) / 100
  ),
  chartColor: "#3266ad",
};

let currentTab    = "all";
let currentPeriod = 30;
let chart         = null;
let geminiKey     = "";

// Afficher la date de mise à jour
document.getElementById("lastUpdated").textContent = "Mis à jour le " + DERNIERE_MISE_A_JOUR;

function saveGeminiKey() {
  geminiKey = document.getElementById("apiKeyInput").value.trim();
  if (geminiKey) {
    document.getElementById("aiOutput").textContent = "Clé Gemini enregistrée ! Clique sur un bouton pour analyser tes KPI.";
    document.getElementById("apiKeyInput").value = "••••••••••••••••";
  }
}

function renderMetrics(tab) {
  const grid = document.getElementById("metricsGrid");
  grid.innerHTML = "";
  DATA[tab].metrics.forEach(m => {
    const cls   = m.up ? "trend-up" : "trend-down";
    const arrow = m.up ? "↑" : "↓";
    const src   = m.source ? `<div class="metric-source">${m.source}</div>` : "";
    grid.innerHTML += `
      <div class="metric-card">
        <div class="metric-label">${m.label}</div>
        <div class="metric-value">${m.value}</div>
        <div class="metric-trend ${cls}">${arrow} ${m.trend}</div>
        ${src}
      </div>`;
  });
}

function renderChart(tab, period) {
  const d      = DATA[tab];
  const sliced = d.chartData.slice(-period);
  const labels = sliced.map((_, i) => `J-${sliced.length - i}`);
  document.getElementById("chartTitle").textContent = `${d.chartLabel} — ${period} derniers jours`;
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("mainChart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: d.chartLabel,
        data: sliced,
        borderColor: d.chartColor,
        backgroundColor: d.chartColor + "18",
        borderWidth: 1.5,
        tension: 0.4,
        fill: true,
        pointRadius: 0,
        pointHoverRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 11 }, color: "#888", maxTicksLimit: 8 }, grid: { display: false } },
        y: { ticks: { font: { size: 11 }, color: "#888" }, grid: { color: "rgba(128,128,128,0.1)" } }
      }
    }
  });
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  renderMetrics(tab);
  renderChart(tab, currentPeriod);
  document.getElementById("aiOutput").textContent = "Clique sur un bouton pour analyser ce canal.";
}

function updatePeriod(val) {
  currentPeriod = parseInt(val);
  renderChart(currentTab, currentPeriod);
}

async function analyzeKPIs(type) {
  if (!geminiKey) {
    document.getElementById("aiOutput").textContent = "⚠️ Enregistre d'abord ta clé API Gemini ci-dessus.";
    return;
  }
  const metrics  = DATA[currentTab].metrics.map(m => `${m.label}: ${m.value} (${m.trend})`).join(", ");
  const tabLabel = { all: "vue d'ensemble", newsletter: "infolettre", linkedin: "LinkedIn", website: "site web" }[currentTab];
  const prompts  = {
    résume:          `Tu es un analyste marketing. Résume en 3 phrases claires la performance de ce canal (${tabLabel}) basée sur ces KPI : ${metrics}. Sois direct et concis.`,
    anomalie:        `Tu es un analyste marketing. Identifie toute anomalie ou métrique préoccupante dans ces KPI (${tabLabel}) : ${metrics}. Explique brièvement en 2-3 phrases.`,
    recommandations: `Tu es un stratège marketing. Donne 3 recommandations concrètes et actionnables pour améliorer la performance de ce canal (${tabLabel}), basées sur ces KPI : ${metrics}.`,
    objectifs:       `Tu es un coach marketing. Propose des objectifs SMART réalistes pour le prochain mois pour ce canal (${tabLabel}), basé sur les métriques actuelles : ${metrics}.`,
  };
  const out     = document.getElementById("aiOutput");
  const spinner = document.getElementById("aiSpinner");
  const btns    = document.querySelectorAll(".ai-btn");
  out.textContent = "";
  spinner.style.display = "inline-block";
  btns.forEach(b => b.disabled = true);
  try {
    const res  = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,
      { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompts[type] }] }] }) }
    );
    const data = await res.json();
    spinner.style.display = "none";
    btns.forEach(b => b.disabled = false);
    if (data.error) { out.textContent = "Erreur API : " + data.error.message; return; }
    out.textContent = data.candidates?.[0]?.content?.parts?.[0]?.text || "Aucune réponse reçue.";
  } catch(e) {
    spinner.style.display = "none";
    btns.forEach(b => b.disabled = false);
    out.textContent = "Erreur de connexion. Vérifie ta clé API et ta connexion internet.";
  }
}

renderMetrics("all");
renderChart("all", 30);
</script>
</body>
</html>
