<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau de bord KPI — RSN</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens RSN ── */
    :root {
      --rsn-navy:   #003469;
      --rsn-yellow: #FFCC4E;
      --rsn-green:  #00A759;
      --rsn-red:    #EE3124;
      --rsn-blue:   #0061AF;
      --rsn-dark-red: #5E0000;
      --rsn-dark-yellow: #624E11;
    }

    /* ── Light mode ── */
    [data-theme="light"] {
      --bg:         #f5f6f8;
      --bg-card:    #ffffff;
      --bg-header:  #003469;
      --text:       #1a1a18;
      --text-muted: #6b6b67;
      --text-header:#ffffff;
      --border:     rgba(0,52,105,0.12);
      --accent:     #003469;
      --accent-soft:#e8eef5;
      --up:         #00A759;
      --down:       #EE3124;
      --chart1:     #003469;
      --chart2:     #0061AF;
      --chart3:     #00A759;
      --chart4:     #FFCC4E;
      --toggle-bg:  #e8eef5;
      --toggle-icon:#003469;
      --badge-live-bg: #e6f7ef;
      --badge-live-text: #00A759;
      --badge-live-dot: #00A759;
      --shadow:     0 1px 3px rgba(0,52,105,0.08);
    }

    /* ── Dark mode ── */
    [data-theme="dark"] {
      --bg:         #0a0f1a;
      --bg-card:    #111827;
      --bg-header:  #0d1a2e;
      --text:       #e8eef5;
      --text-muted: #8899aa;
      --text-header:#e8eef5;
      --border:     rgba(255,255,255,0.08);
      --accent:     #FFCC4E;
      --accent-soft:#1a1500;
      --up:         #00A759;
      --down:       #EE3124;
      --chart1:     #FFCC4E;
      --chart2:     #0061AF;
      --chart3:     #00A759;
      --chart4:     #EE3124;
      --toggle-bg:  #1a2535;
      --toggle-icon:#FFCC4E;
      --badge-live-bg: #0a2010;
      --badge-live-text: #00A759;
      --badge-live-dot: #00A759;
      --shadow:     0 1px 3px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header RSN ── */
    .site-header {
      background: var(--bg-header);
      padding: 14px 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .site-header img { height: 40px; display: block; }
    .header-tagline {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    /* ── Toggle dark/light ── */
    .theme-toggle {
      background: var(--toggle-bg);
      border: none;
      border-radius: 20px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--toggle-icon);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .theme-toggle:hover { opacity: 0.85; }

    /* ── Container ── */
    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem;
    }
    .toolbar-left h1 { font-size: 20px; font-weight: 600; color: var(--text); }
    .toolbar-left p  { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .live-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--badge-live-text);
      background: var(--badge-live-bg);
      border-radius: 20px; padding: 4px 10px;
    }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--badge-live-dot); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .error-badge {
      display: none; align-items: center; gap: 5px;
      font-size: 11px; color: var(--down); background: rgba(238,49,36,0.1);
      border-radius: 20px; padding: 4px 10px;
    }
    .last-updated { font-size: 11px; color: var(--text-muted); }

    .ctrl-btn {
      padding: 7px 14px; border-radius: 8px;
      border: 0.5px solid var(--border);
      background: var(--bg-card); font-size: 13px;
      cursor: pointer; color: var(--text);
      transition: opacity 0.15s;
    }
    .ctrl-btn:hover { opacity: 0.8; }

    .period-select {
      font-size: 13px; padding: 7px 12px; border-radius: 8px;
      border: 0.5px solid var(--border);
      background: var(--bg-card); color: var(--text); cursor: pointer;
    }

    /* ── Gemini banner ── */
    .api-banner {
      background: var(--accent-soft);
      border: 0.5px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 10px; padding: 12px 16px; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .api-banner span { font-size: 13px; color: var(--text-muted); flex: 1; min-width: 200px; }
    .api-banner a { color: var(--accent); }
    .api-banner input {
      flex: 2; min-width: 200px; padding: 7px 10px; border-radius: 7px;
      border: 0.5px solid var(--border); font-size: 13px; font-family: monospace;
      background: var(--bg-card); color: var(--text);
    }
    .api-banner button {
      padding: 7px 16px; border-radius: 7px;
      background: #003469; color: #ffffff;
      border: none; font-size: 13px; cursor: pointer; font-weight: 500;
    }
    .api-banner button:hover { opacity: 0.9; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .tab {
      padding: 8px 18px; border-radius: 8px;
      border: 0.5px solid var(--border);
      background: transparent; cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--text-muted); transition: all 0.15s;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    [data-theme="dark"] .tab.active { color: #0a0f1a; }
    .tab:hover:not(.active) { background: var(--accent-soft); color: var(--text); }

    /* ── Accent bar under active tab ── */
    .tab.active::after { content: none; }

    /* ── Metric cards ── */
    .metrics-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px; margin-bottom: 1.25rem;
    }
    .metric-card {
      background: var(--bg-card); border-radius: 12px;
      border: 0.5px solid var(--border);
      border-top: 3px solid var(--accent);
      padding: 16px; box-shadow: var(--shadow);
      transition: transform 0.15s;
    }
    .metric-card:hover { transform: translateY(-1px); }
    .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .metric-value { font-size: 24px; font-weight: 600; color: var(--text); }
    .metric-trend { font-size: 12px; margin-top: 5px; font-weight: 500; }
    .trend-up   { color: var(--up); }
    .trend-down { color: var(--down); }
    .metric-source { font-size: 10px; color: var(--text-muted); margin-top: 4px; opacity: 0.7; }

    /* ── Chart card ── */
    .chart-card {
      background: var(--bg-card); border-radius: 12px;
      border: 0.5px solid var(--border);
      padding: 1.25rem; margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }
    .chart-title { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 14px; }

    /* ── AI card ── */
    .ai-card {
      background: var(--bg-card); border-radius: 12px;
      border: 0.5px solid var(--border);
      border-left: 3px solid #4285f4;
      padding: 1.25rem; box-shadow: var(--shadow);
    }
    .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: #4285f4; }
    .ai-header-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .spinner {
      display: none; width: 13px; height: 13px;
      border: 2px solid var(--border); border-top-color: #4285f4;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ai-output {
      font-size: 13px; color: var(--text-muted); line-height: 1.75;
      min-height: 48px; margin-bottom: 14px; white-space: pre-wrap;
    }
    .ai-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .ai-btn {
      padding: 7px 14px; border-radius: 8px;
      border: 0.5px solid var(--border);
      background: var(--accent-soft); cursor: pointer; font-size: 12px; color: var(--text);
      transition: background 0.12s;
    }
    .ai-btn:hover    { background: var(--accent); color: #fff; }
    [data-theme="dark"] .ai-btn:hover { color: #0a0f1a; }
    .ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Footer ── */
    .site-footer {
      text-align: center; padding: 1.5rem;
      font-size: 11px; color: var(--text-muted);
      border-top: 0.5px solid var(--border);
      margin-top: 2rem;
    }
    .footer-bar {
      height: 4px;
      background: linear-gradient(90deg, #003469, #0061AF, #00A759, #FFCC4E, #EE3124);
    }
  </style>
</head>
<body>

<!-- Header RSN -->
<header class="site-header">
  <div>
    <img id="headerLogo" src="" alt="Réseau Santé Numérique" />
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Mode sombre</button>
  </div>
</header>

<div class="container">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <h1>Tableau de bord KPI</h1>
      <p>Infolettre · LinkedIn · Site web</p>
    </div>
    <div class="toolbar-right">
      <span class="live-badge" id="liveBadge" style="display:none"><span class="live-dot"></span> Google Sheet live</span>
      <span class="error-badge" id="errorBadge">⚠ Données hors ligne</span>
      <span class="last-updated" id="lastUpdated"></span>
      <button class="ctrl-btn" onclick="loadSheet()">↻ Actualiser</button>
      <select class="period-select" id="periodSelect" onchange="renderAll()">
        <option value="4">4 semaines</option>
        <option value="8" selected>8 semaines</option>
        <option value="12">12 semaines</option>
        <option value="26">6 mois</option>
        <option value="52">1 an</option>
      </select>
    </div>
  </div>

  <!-- Gemini banner -->
  <div class="api-banner">
    <span>Clé API Google Gemini (gratuit) —
      <a href="https://aistudio.google.com/app/apikey" target="_blank">Obtenir ma clé</a>
    </span>
    <input type="password" id="apiKeyInput" placeholder="AIza..." />
    <button onclick="saveGeminiKey()">Enregistrer</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('all',        this)">Vue d'ensemble</button>
    <button class="tab"        onclick="switchTab('newsletter', this)">Infolettre</button>
    <button class="tab"        onclick="switchTab('linkedin',   this)">LinkedIn</button>
    <button class="tab"        onclick="switchTab('website',    this)">Site web</button>
  </div>

  <!-- Metrics -->
  <div id="metricsGrid" class="metrics-grid"></div>

  <!-- Chart -->
  <div class="chart-card">
    <div class="chart-title" id="chartTitle">Évolution</div>
    <div style="position:relative;width:100%;height:240px;">
      <canvas id="mainChart" role="img" aria-label="Graphique d'évolution des KPI"></canvas>
    </div>
  </div>

  <!-- AI -->
  <div class="ai-card">
    <div class="ai-header">
      <div class="ai-dot"></div>
      <span class="ai-header-title">Analyse IA — Gemini</span>
      <div class="spinner" id="aiSpinner"></div>
    </div>
    <div class="ai-output" id="aiOutput">Enregistre ta clé Gemini puis clique sur un bouton pour générer une analyse.</div>
    <div class="ai-buttons">
      <button class="ai-btn" onclick="analyzeKPIs('résume')">Résumé de performance ↗</button>
      <button class="ai-btn" onclick="analyzeKPIs('anomalie')">Détecter anomalies ↗</button>
      <button class="ai-btn" onclick="analyzeKPIs('recommandations')">Recommandations ↗</button>
      <button class="ai-btn" onclick="analyzeKPIs('objectifs')">Proposer objectifs ↗</button>
    </div>
  </div>

</div>

<div class="footer-bar"></div>
<footer class="site-footer">
  © Réseau Santé Numérique — Tableau de bord KPI
</footer>

let isDark = false;

  isDark = !isDark;

  document.getElementById("themeBtn").textContent = isDark ? "☀️ Mode clair" : "🌙 Mode sombre";

/* ═══════════════════════════════════════════
   CONFIG SHEET
   C=Date, D=Abonnées, E=Nouveaux, F=Désabonn.
   G=Impressions, H=Réactions, I=Abonnés(LK)
   J=Clics, K=Partages
   L=Visiteurs, M=Sessions, N=Pages vues
   ═══════════════════════════════════════════ */
const SHEET_ID  = "1L0OGIG21FQr5yC9FgeL1a4ln8_PbnT0LtXcE-K_yqFc";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&range=C6:N1000`;

let rows       = [];
let currentTab = "all";
let chart      = null;
let geminiKey  = "";

/* ═══════════════════════════════════════════
   Chargement Sheet
   ═══════════════════════════════════════════ */
async function loadSheet() {
  try {
    const res  = await fetch(SHEET_URL);
    const text = await res.text();
    rows = parseCSV(text).filter(r => r.Date && r.Date.trim() !== "" && r.Date !== "Date");
    document.getElementById("liveBadge").style.display  = "inline-flex";
    document.getElementById("errorBadge").style.display = "none";
    const last = rows[rows.length - 1];
    document.getElementById("lastUpdated").textContent = "Mis à jour le " + last.Date;
    renderAll();
  } catch(e) {
    document.getElementById("liveBadge").style.display  = "none";
    document.getElementById("errorBadge").style.display = "inline-flex";
  }
}

function parseCSV(text) {
  const lines   = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.replace(/"/g,"").trim());
  return lines.slice(1).map(line => {
    const vals = line.split(",").map(v => v.replace(/"/g,"").trim());
    const obj  = {};
    headers.forEach((h, i) => obj[h] = vals[i] || "0");
    return obj;
  });
}

/* ═══════════════════════════════════════════
   Tendances
   ═══════════════════════════════════════════ */
function trend(cur, prv) {
  const d = parseFloat(cur) - parseFloat(prv);
  return (d >= 0 ? "+" : "") + Math.round(d);
}
function trendUp(cur, prv, inv) {
  const d = parseFloat(cur) - parseFloat(prv);
  return inv ? d <= 0 : d >= 0;
}

/* ═══════════════════════════════════════════
   Métriques
   ═══════════════════════════════════════════ */
function getMetrics(tab) {
  if (!rows.length) return [];
  const l = rows[rows.length - 1];
  const p = rows.length > 1 ? rows[rows.length - 2] : l;

  const n = k => parseInt(l[k] || 0).toLocaleString("fr-CA");

  if (tab === "newsletter") return [
    { label: "Abonnées",       value: n("Abonnées"),   trend: trend(l["Abonnées"]||0,   p["Abonnées"]||0),   up: trendUp(l["Abonnées"]||0,   p["Abonnées"]||0,   false), source: "Mailchimp" },
    { label: "Nouveaux",       value: n("Nouveaux"),   trend: trend(l["Nouveaux"]||0,   p["Nouveaux"]||0),   up: trendUp(l["Nouveaux"]||0,   p["Nouveaux"]||0,   false), source: "Mailchimp" },
    { label: "Désabonnements", value: n("Désabonn."),  trend: trend(l["Désabonn."]||0,  p["Désabonn."]||0),  up: trendUp(l["Désabonn."]||0,  p["Désabonn."]||0,  true),  source: "Mailchimp" },
  ];

  if (tab === "linkedin") return [
    { label: "Impressions",       value: n("Impressions"), trend: trend(l["Impressions"]||0, p["Impressions"]||0), up: trendUp(l["Impressions"]||0, p["Impressions"]||0, false), source: "LinkedIn" },
    { label: "Réactions",         value: n("Réactions"),   trend: trend(l["Réactions"]||0,   p["Réactions"]||0),   up: trendUp(l["Réactions"]||0,   p["Réactions"]||0,   false), source: "LinkedIn" },
    { label: "Abonnés LinkedIn",  value: n("Abonnés"),     trend: trend(l["Abonnés"]||0,     p["Abonnés"]||0),     up: trendUp(l["Abonnés"]||0,     p["Abonnés"]||0,     false), source: "LinkedIn" },
    { label: "Clics publication", value: n("Clics"),       trend: trend(l["Clics"]||0,       p["Clics"]||0),       up: trendUp(l["Clics"]||0,       p["Clics"]||0,       false), source: "LinkedIn" },
  ];

  if (tab === "website") return [
    { label: "Visiteurs",  value: n("Visiteurs"),   trend: trend(l["Visiteurs"]||0,   p["Visiteurs"]||0),   up: trendUp(l["Visiteurs"]||0,   p["Visiteurs"]||0,   false), source: "Site web" },
    { label: "Sessions",   value: n("Sessions"),    trend: trend(l["Sessions"]||0,    p["Sessions"]||0),    up: trendUp(l["Sessions"]||0,    p["Sessions"]||0,    false), source: "Site web" },
    { label: "Pages vues", value: n("Pages vues"),  trend: trend(l["Pages vues"]||0,  p["Pages vues"]||0),  up: trendUp(l["Pages vues"]||0,  p["Pages vues"]||0,  false), source: "Site web" },
  ];

  return [
    { label: "Abonnées infolettre", value: n("Abonnées"),    trend: trend(l["Abonnées"]||0,    p["Abonnées"]||0),    up: trendUp(l["Abonnées"]||0,    p["Abonnées"]||0,    false), source: "Mailchimp" },
    { label: "Impressions LK",      value: n("Impressions"), trend: trend(l["Impressions"]||0, p["Impressions"]||0), up: trendUp(l["Impressions"]||0, p["Impressions"]||0, false), source: "LinkedIn" },
    { label: "Abonnés LinkedIn",    value: n("Abonnés"),     trend: trend(l["Abonnés"]||0,     p["Abonnés"]||0),     up: trendUp(l["Abonnés"]||0,     p["Abonnés"]||0,     false), source: "LinkedIn" },
    { label: "Visiteurs site web",  value: n("Visiteurs"),   trend: trend(l["Visiteurs"]||0,   p["Visiteurs"]||0),   up: trendUp(l["Visiteurs"]||0,   p["Visiteurs"]||0,   false), source: "Site web" },
  ];
}

/* ═══════════════════════════════════════════
   Graphique
   ═══════════════════════════════════════════ */
function getChartColor(tab) {
  const colors = {
    newsletter: isDark ? "#FFCC4E" : "#003469",
    linkedin:   "#0061AF",
    website:    "#00A759",
    all:        isDark ? "#FFCC4E" : "#003469",
  };
  return colors[tab];
}

function getChartData(tab, period) {
  const slice  = rows.slice(-period);
  const labels = slice.map(r => r.Date);
  const keys   = { newsletter: "Abonnées", linkedin: "Impressions", website: "Visiteurs", all: "Abonnées" };
  const lbls   = { newsletter: "Abonnées", linkedin: "Impressions", website: "Visiteurs", all: "Abonnées" };
  const key    = keys[tab];
  return { labels, data: slice.map(r => parseFloat(r[key] || 0)), label: lbls[tab], color: getChartColor(tab) };
}

function renderChart(tab, period) {
  if (!rows.length) return;
  const { labels, data, label, color } = getChartData(tab, period);
  document.getElementById("chartTitle").textContent = `${label} — ${period} dernières semaines`;
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("mainChart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label, data,
        borderColor: color,
        backgroundColor: color + "22",
        borderWidth: 2,
        tension: 0.4,
        fill: true,
        pointRadius: 4,
        pointBackgroundColor: color,
        pointHoverRadius: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 11 }, color: isDark ? "#8899aa" : "#888", maxTicksLimit: 8 }, grid: { display: false } },
        y: { ticks: { font: { size: 11 }, color: isDark ? "#8899aa" : "#888" }, grid: { color: isDark ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.06)" } }
      }
    }
  });
}

/* ═══════════════════════════════════════════
   Rendu métriques
   ═══════════════════════════════════════════ */
function renderMetrics(tab) {
  const grid    = document.getElementById("metricsGrid");
  const metrics = getMetrics(tab);
  if (!metrics.length) { grid.innerHTML = `<div style="font-size:13px;color:var(--text-muted);padding:1rem">Chargement...</div>`; return; }
  grid.innerHTML = "";
  metrics.forEach(m => {
    const cls   = m.up ? "trend-up" : "trend-down";
    const arrow = m.up ? "↑" : "↓";
    const src   = m.source ? `<div class="metric-source">${m.source}</div>` : "";
    grid.innerHTML += `
      <div class="metric-card">
        <div class="metric-label">${m.label}</div>
        <div class="metric-value">${m.value}</div>
        <div class="metric-trend ${cls}">${arrow} ${m.trend}</div>
        ${src}
      </div>`;
  });
}

function renderAll() {
  const period = parseInt(document.getElementById("periodSelect").value);
  renderMetrics(currentTab);
  renderChart(currentTab, period);
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  renderAll();
  document.getElementById("aiOutput").textContent = "Clique sur un bouton pour analyser ce canal.";
}

/* ═══════════════════════════════════════════
   Clé Gemini
   ═══════════════════════════════════════════ */
function saveGeminiKey() {
  geminiKey = document.getElementById("apiKeyInput").value.trim();
  if (geminiKey) {
    document.getElementById("aiOutput").textContent = "Clé Gemini enregistrée ! Clique sur un bouton pour analyser tes KPI.";
    document.getElementById("apiKeyInput").value = "••••••••••••••••";
  }
}

/* ═══════════════════════════════════════════
   Analyse IA
   ═══════════════════════════════════════════ */
async function analyzeKPIs(type) {
  if (!geminiKey) { document.getElementById("aiOutput").textContent = "⚠️ Enregistre d'abord ta clé API Gemini ci-dessus."; return; }
  const metrics  = getMetrics(currentTab).map(m => `${m.label}: ${m.value} (${m.trend})`).join(", ");
  const tabLabel = { all: "vue d'ensemble", newsletter: "infolettre", linkedin: "LinkedIn", website: "site web" }[currentTab];
  const prompts  = {
    résume:          `Tu es un analyste marketing pour le Réseau Santé Numérique (RSN). Résume en 3 phrases claires la performance de ce canal (${tabLabel}) : ${metrics}. Sois direct et concis.`,
    anomalie:        `Tu es un analyste marketing pour le RSN. Identifie toute anomalie ou métrique préoccupante dans ces KPI (${tabLabel}) : ${metrics}. Explique en 2-3 phrases.`,
    recommandations: `Tu es un stratège marketing pour le RSN. Donne 3 recommandations concrètes pour améliorer ce canal (${tabLabel}) basées sur : ${metrics}.`,
    objectifs:       `Tu es un coach marketing pour le RSN. Propose des objectifs SMART pour le prochain mois pour ce canal (${tabLabel}) basé sur : ${metrics}.`,
  };
  const out = document.getElementById("aiOutput");
  const spinner = document.getElementById("aiSpinner");
  const btns = document.querySelectorAll(".ai-btn");
  out.textContent = "";
  spinner.style.display = "inline-block";
  btns.forEach(b => b.disabled = true);
  try {
    const res  = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,
      { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompts[type] }] }] }) });
    const data = await res.json();
    spinner.style.display = "none";
    btns.forEach(b => b.disabled = false);
    if (data.error) { out.textContent = "Erreur API : " + data.error.message; return; }
    out.textContent = data.candidates?.[0]?.content?.parts?.[0]?.text || "Aucune réponse reçue.";
  } catch(e) {
    spinner.style.display = "none";
    btns.forEach(b => b.disabled = false);
    out.textContent = "Erreur de connexion.";
  }
}

loadSheet();
</script>
