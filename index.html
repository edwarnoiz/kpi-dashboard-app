<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau de bord KPI — RSN</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rsn-navy:   #003469;
      --rsn-yellow: #FFCC4E;
      --rsn-green:  #00A759;
      --rsn-red:    #EE3124;
      --rsn-blue:   #0061AF;
    }

    [data-theme="light"] {
      --bg:           #f5f6f8;
      --bg-card:      #ffffff;
      --bg-header:    #003469;
      --text:         #1a1a18;
      --text-muted:   #6b6b67;
      --border:       rgba(0,52,105,0.12);
      --accent:       #003469;
      --accent-soft:  #e8eef5;
      --up:           #00A759;
      --down:         #EE3124;
      --toggle-bg:    rgba(255,255,255,0.15);
      --toggle-text:  #ffffff;
      --shadow:       0 1px 4px rgba(0,52,105,0.08);
      --grid-line:    rgba(0,0,0,0.06);
      --tick-color:   #888;
    }

    [data-theme="dark"] {
      --bg:           #0a0f1a;
      --bg-card:      #111827;
      --bg-header:    #0d1a2e;
      --text:         #e8eef5;
      --text-muted:   #8899aa;
      --border:       rgba(255,255,255,0.08);
      --accent:       #FFCC4E;
      --accent-soft:  #1a1500;
      --up:           #00A759;
      --down:         #EE3124;
      --toggle-bg:    rgba(255,255,255,0.1);
      --toggle-text:  #FFCC4E;
      --shadow:       0 1px 4px rgba(0,0,0,0.4);
      --grid-line:    rgba(255,255,255,0.05);
      --tick-color:   #8899aa;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; transition: background 0.2s, color 0.2s;
    }

    /* ── Header ── */
    .site-header {
      background: var(--bg-header);
      padding: 14px 2rem;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .site-header img { height: 38px; }
    .theme-toggle {
      background: var(--toggle-bg); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 7px 14px; cursor: pointer;
      font-size: 13px; color: var(--toggle-text);
      display: flex; align-items: center; gap: 6px;
    }
    .theme-toggle:hover { opacity: 0.85; }

    /* ── Container ── */
    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem;
    }
    .toolbar-left h1 { font-size: 20px; font-weight: 600; }
    .toolbar-left p  { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .toolbar-right   { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .live-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: #00A759; background: rgba(0,167,89,0.1);
      border-radius: 20px; padding: 4px 10px;
    }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #00A759; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .error-badge {
      display: none; align-items: center; gap: 5px;
      font-size: 11px; color: #EE3124; background: rgba(238,49,36,0.1);
      border-radius: 20px; padding: 4px 10px;
    }
    .last-updated { font-size: 11px; color: var(--text-muted); }
    .ctrl-btn {
      padding: 7px 14px; border-radius: 8px; border: 0.5px solid var(--border);
      background: var(--bg-card); font-size: 13px; cursor: pointer; color: var(--text);
    }
    .ctrl-btn:hover { opacity: 0.8; }
    .period-select {
      font-size: 13px; padding: 7px 12px; border-radius: 8px;
      border: 0.5px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer;
    }

    /* ── Gemini banner ── */
    .api-banner {
      background: var(--accent-soft); border: 0.5px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 10px; padding: 12px 16px; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .api-banner span { font-size: 13px; color: var(--text-muted); flex: 1; min-width: 200px; }
    .api-banner a { color: var(--accent); }
    .api-banner input {
      flex: 2; min-width: 200px; padding: 7px 10px; border-radius: 7px;
      border: 0.5px solid var(--border); font-size: 13px; font-family: monospace;
      background: var(--bg-card); color: var(--text);
    }
    .api-banner button {
      padding: 7px 16px; border-radius: 7px;
      background: #003469; color: #ffffff;
      border: none; font-size: 13px; cursor: pointer; font-weight: 500;
    }
    .api-banner button:hover { opacity: 0.85; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab {
      padding: 8px 18px; border-radius: 8px; border: 0.5px solid var(--border);
      background: transparent; cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--text-muted); transition: all 0.15s;
    }
    .tab.active { background: #003469; color: #fff; border-color: #003469; }
    [data-theme="dark"] .tab.active { background: #FFCC4E; color: #0a0f1a; border-color: #FFCC4E; }
    .tab:hover:not(.active) { background: var(--accent-soft); color: var(--text); }

    /* ── KPI synthèse (vue d ensemble) ── */
    .kpi-summary {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px; margin-bottom: 1.5rem;
    }
    .kpi-big-card {
      background: var(--bg-card); border-radius: 14px;
      border: 0.5px solid var(--border); border-top: 4px solid var(--card-accent, #003469);
      padding: 20px; box-shadow: var(--shadow);
    }
    .kpi-big-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
    .kpi-big-value { font-size: 32px; font-weight: 700; color: var(--text); line-height: 1; }
    .kpi-big-trend { font-size: 12px; font-weight: 500; margin-top: 6px; }
    .kpi-big-sub   { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* ── Grille métriques ── */
    .metrics-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px; margin-bottom: 1.5rem;
    }
    .metric-card {
      background: var(--bg-card); border-radius: 12px;
      border: 0.5px solid var(--border); border-top: 3px solid var(--card-accent, #003469);
      padding: 14px 16px; box-shadow: var(--shadow);
    }
    .metric-label  { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .metric-value  { font-size: 22px; font-weight: 600; color: var(--text); }
    .metric-trend  { font-size: 12px; margin-top: 4px; font-weight: 500; }
    .trend-up      { color: var(--up); }
    .trend-down    { color: var(--down); }
    .metric-source { font-size: 10px; color: var(--text-muted); margin-top: 3px; opacity: 0.7; }

    /* ── Graphiques ── */
    .charts-section { margin-bottom: 1.5rem; }
    .charts-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    .charts-stack {
      display: flex; flex-direction: column; gap: 14px;
    }
    .chart-card {
      background: var(--bg-card); border-radius: 12px;
      border: 0.5px solid var(--border); padding: 1rem 1.25rem;
      box-shadow: var(--shadow);
    }
    .chart-card.full-width { grid-column: 1 / -1; }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .chart-title  { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .chart-value  { font-size: 18px; font-weight: 700; color: var(--text); }

    /* ── IA ── */
    .ai-card {
      background: var(--bg-card); border-radius: 12px;
      border: 0.5px solid var(--border); border-left: 3px solid #4285f4;
      padding: 1.25rem; box-shadow: var(--shadow);
    }
    .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .ai-dot    { width: 8px; height: 8px; border-radius: 50%; background: #4285f4; }
    .ai-header-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .spinner {
      display: none; width: 13px; height: 13px;
      border: 2px solid var(--border); border-top-color: #4285f4;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ai-output {
      font-size: 13px; color: var(--text-muted); line-height: 1.75;
      min-height: 48px; margin-bottom: 14px; white-space: pre-wrap;
    }
    .ai-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .ai-btn {
      padding: 7px 14px; border-radius: 8px; border: 0.5px solid var(--border);
      background: var(--accent-soft); cursor: pointer; font-size: 12px; color: var(--text);
      transition: all 0.12s;
    }
    .ai-btn:hover    { background: #003469; color: #fff; }
    [data-theme="dark"] .ai-btn:hover { background: #FFCC4E; color: #0a0f1a; }
    .ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Insights ── */
    .insights-card {
      background: var(--bg-card); border-radius: 12px;
      border: 0.5px solid var(--border); border-left: 4px solid #FFCC4E;
      padding: 1.25rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; margin-top: 1.5rem;
    }
    .insights-title {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 1rem;
    }
    .insights-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
    }
    .insights-col h4 {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .insights-list { list-style: none; }
    .insights-list li {
      font-size: 13px; color: var(--text);
      padding: 6px 0; border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .insights-list li:last-child { border-bottom: none; }
    .insights-num {
      font-size: 10px; font-weight: 700; color: #fff;
      background: #FFCC4E; border-radius: 50%;
      width: 18px; height: 18px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; color: #003469;
    }
    .insights-empty { font-size: 12px; color: var(--text-muted); font-style: italic; }
    @media (max-width: 500px) { .insights-grid { grid-template-columns: 1fr; } }

    /* ── Footer ── */
    .footer-bar { height: 4px; background: linear-gradient(90deg, #003469, #0061AF, #00A759, #FFCC4E, #EE3124); }
    .site-footer { text-align: center; padding: 1rem; font-size: 11px; color: var(--text-muted); }
  </style>
</head>
<body>

<header class="site-header">
  <img id="headerLogo" src="" alt="Réseau Santé Numérique" />
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Mode sombre</button>
</header>

<div class="container">

  <div class="toolbar">
    <div class="toolbar-left">
      <h1>Tableau de bord KPI</h1>
      <p>Infolettre · LinkedIn · Site web</p>
    </div>
    <div class="toolbar-right">
      <span class="live-badge" id="liveBadge" style="display:none"><span class="live-dot"></span> Google Sheet live</span>
      <span class="error-badge" id="errorBadge">⚠ Données hors ligne</span>
      <span class="last-updated" id="lastUpdated"></span>
      <button class="ctrl-btn" onclick="loadSheet()">↻ Actualiser</button>
      <select class="period-select" id="periodSelect" onchange="renderAll()">
        <option value="4">4 semaines</option>
        <option value="8" selected>8 semaines</option>
        <option value="12">12 semaines</option>
        <option value="26">6 mois</option>
        <option value="52">1 an</option>
      </select>
    </div>
  </div>

  <div class="api-banner">
    <span>Clé API OpenRouter (gratuit) — <a href="https://openrouter.ai/keys" target="_blank">Obtenir ma clé</a></span>
    <input type="password" id="apiKeyInput" placeholder="sk-or-..." />
    <button onclick="saveGeminiKey()">Enregistrer</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('all',        this)">Vue d'ensemble</button>
    <button class="tab"        onclick="switchTab('newsletter', this)">Infolettre</button>
    <button class="tab"        onclick="switchTab('linkedin',   this)">LinkedIn</button>
    <button class="tab"        onclick="switchTab('website',    this)">Site web</button>
  </div>

  <!-- Contenu dynamique -->
  <div id="tabContent"></div>

  <div class="ai-card" style="margin-top:1.5rem">
    <div class="ai-header">
      <div class="ai-dot"></div>
      <span class="ai-header-title">Analyse IA — OpenRouter</span>
      <div class="spinner" id="aiSpinner"></div>
    </div>
    <div class="ai-output" id="aiOutput">Enregistre ta clé OpenRouter puis clique sur un bouton pour générer une analyse.</div>
    <div class="ai-buttons">
      <button class="ai-btn" onclick="analyzeKPIs('résume')">Résumé de performance ↗</button>
      <button class="ai-btn" onclick="analyzeKPIs('anomalie')">Détecter anomalies ↗</button>
      <button class="ai-btn" onclick="analyzeKPIs('recommandations')">Recommandations ↗</button>
      <button class="ai-btn" onclick="analyzeKPIs('objectifs')">Proposer objectifs ↗</button>
    </div>
  </div>

</div>

<div class="footer-bar"></div>
<footer class="site-footer">© Réseau Santé Numérique — Tableau de bord KPI</footer>

const SHEET_ID  = "1L0OGIG21FQr5yC9FgeL1a4ln8_PbnT0LtXcE-K_yqFc";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&range=C6:S1000`;

let rows       = [];
let currentTab = "all";

let geminiKey  = "";

/* ── Couleurs par canal ── */
const COLORS = {
  newsletter: "#003469",
  linkedin:   "#0061AF",
  website:    "#00A759",
};

/* ── Chargement Sheet ── */
async function loadSheet() {
  try {
    const res  = await fetch(SHEET_URL);
    const text = await res.text();
    rows = parseCSV(text).filter(r => r.Date && r.Date.trim() !== "" && r.Date !== "Date");
    document.getElementById("liveBadge").style.display  = "inline-flex";
    document.getElementById("errorBadge").style.display = "none";
    const last = rows[rows.length - 1];
    document.getElementById("lastUpdated").textContent = "Mis à jour le " + last.Date;
    renderAll();
  } catch(e) {
    document.getElementById("liveBadge").style.display  = "none";
    document.getElementById("errorBadge").style.display = "inline-flex";
  }
}

function parseCSV(text) {
  const lines   = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.replace(/"/g,"").trim());
  return lines.slice(1).map(line => {
    const vals = line.split(",").map(v => v.replace(/"/g,"").trim());
    const obj  = {};
    headers.forEach((h, i) => obj[h] = vals[i] || "0");
    return obj;
  });
}

/* ── Helpers ── */
function n(val) { return parseInt(val || 0).toLocaleString("fr-CA"); }
function td(cur, prv) {
  const d = parseFloat(cur||0) - parseFloat(prv||0);
  return (d >= 0 ? "+" : "") + Math.round(d);
}
function tUp(cur, prv, inv) {
  const d = parseFloat(cur||0) - parseFloat(prv||0);
  return inv ? d <= 0 : d >= 0;
}
function sliced(period) { return rows.slice(-period); }
function labels(period) { return sliced(period).map(r => r.Date); }
function vals(key, period) { return sliced(period).map(r => parseFloat(r[key]||0)); }
function chartColor(base) { return isDark ? lightenForDark(base) : base; }
function lightenForDark(hex) {
  const map = { "#003469": "#4a8fd4", "#0061AF": "#5aa8f0", "#00A759": "#2ecc7a", "#EE3124": "#f56b60", "#FFCC4E": "#FFCC4E" };
  return map[hex] || hex;
}

/* ── Créer un canvas chart ── */
function makeChart(id, label, data, lbls, color, type="line") {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const c = chartColor(color);
  charts[id] = new Chart(canvas, {
    type,
    data: {
      labels: lbls,
      datasets: [{ label, data, borderColor: c, backgroundColor: c+"22", borderWidth: 2,
        tension: 0.4, fill: true, pointRadius: 3, pointBackgroundColor: c, pointHoverRadius: 5 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 10 }, color: isDark?"#8899aa":"#888", maxTicksLimit: 6 }, grid: { display: false } },
        y: { ticks: { font: { size: 10 }, color: isDark?"#8899aa":"#888" }, grid: { color: isDark?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.06)" } }
      }
    }
  });
}

/* ── Carte graphique HTML ── */
function chartCard(id, title, lastVal, fullWidth) {
  const h = fullWidth ? "200px" : "120px";
  return `<div class="chart-card${fullWidth?" full-width":""}">
    <div class="chart-header">
      <span class="chart-title">${title}</span>
      <span class="chart-value">${lastVal}</span>
    </div>
    <div style="position:relative;height:${h}"><canvas id="${id}"></canvas></div>
  </div>`;
}

/* ── VUE D'ENSEMBLE ── */
function renderAll_Overview(period) {
  if (!rows.length) { document.getElementById("tabContent").innerHTML = `<p style="color:var(--text-muted);font-size:13px">Chargement...</p>`; return; }
  const l = rows[rows.length-1];
  const s = sliced(period);
  const lb = labels(period);
  const p = s.length>1 ? s[0] : l;

  // Calculs synthèse
  const portee     = parseInt(l["Impressions"]||0) + parseInt(l["Visiteurs"]||0) + parseInt(l["Abonnées"]||0);
  const porteePrev = parseInt(p["Impressions"]||0) + parseInt(p["Visiteurs"]||0) + parseInt(p["Abonnées"]||0);
  const croissance = parseInt(l["Croiss. nette"]||0) + parseInt(l["Abonnés"]||0);
  const croissPrev = parseInt(p["Croiss. nette"]||0) + parseInt(p["Abonnés"]||0);
  const engage     = parseInt(l["Réactions"]||0) + parseInt(l["Clics"]||0);
  const engagePrev = parseInt(p["Réactions"]||0) + parseInt(p["Clics"]||0);

  const diffPortee = portee - porteePrev;
  const diffCroiss = croissance - croissPrev;
  const diffEngage = engage - engagePrev;

  const kpiHTML = `<div class="kpi-summary">
    <div class="kpi-big-card" style="--card-accent:#003469">
      <div class="kpi-big-label">🌐 Portée totale</div>
      <div class="kpi-big-value">${portee.toLocaleString("fr-CA")}</div>
      <div class="kpi-big-trend ${diffPortee>=0?"trend-up":"trend-down"}">${diffPortee>=0?"↑":"↓"} ${Math.abs(diffPortee).toLocaleString("fr-CA")} \${periodLabel(period)}</div>
      <div class="kpi-big-sub">Impressions LK + Visiteurs + Abonnées</div>
    </div>
    <div class="kpi-big-card" style="--card-accent:#0061AF">
      <div class="kpi-big-label">📈 Croissance audience</div>
      <div class="kpi-big-value">${croissance.toLocaleString("fr-CA")}</div>
      <div class="kpi-big-trend ${diffCroiss>=0?"trend-up":"trend-down"}">${diffCroiss>=0?"↑":"↓"} ${Math.abs(diffCroiss).toLocaleString("fr-CA")} \${periodLabel(period)}</div>
      <div class="kpi-big-sub">Croiss. nette Mailchimp + Abonnés LinkedIn</div>
    </div>
    <div class="kpi-big-card" style="--card-accent:#00A759">
      <div class="kpi-big-label">💬 Engagement</div>
      <div class="kpi-big-value">${engage.toLocaleString("fr-CA")}</div>
      <div class="kpi-big-trend ${diffEngage>=0?"trend-up":"trend-down"}">${diffEngage>=0?"↑":"↓"} ${Math.abs(diffEngage).toLocaleString("fr-CA")} \${periodLabel(period)}</div>
      <div class="kpi-big-sub">Réactions + Clics LinkedIn</div>
    </div>
  </div>`;

  // Graphiques combinés
  const chartsHTML = `<div class="charts-grid">
    ${chartCard("c_impressions", "Impressions LinkedIn",  n(l["Impressions"]), false)}
    ${chartCard("c_visiteurs",   "Visiteurs site web",    n(l["Visiteurs"]),   false)}
    ${chartCard("c_abonnees",    "Abonnées infolettre",   n(l["Abonnées"]),    false)}
    ${chartCard("c_engagement",  "Engagement LinkedIn",   n(engage),           false)}
  </div>`;

  document.getElementById("tabContent").innerHTML = kpiHTML + chartsHTML + insightsHTML(l);

  setTimeout(() => {
    makeChart("c_impressions", "Impressions",  vals("Impressions", period),   lb, "#0061AF");
    makeChart("c_visiteurs",   "Visiteurs",    vals("Visiteurs",   period),   lb, "#00A759");
    makeChart("c_abonnees",    "Abonnées",     vals("Abonnées",    period),   lb, "#003469");
    const engageVals = s.map(r => parseInt(r["Réactions"]||0) + parseInt(r["Clics"]||0));
    makeChart("c_engagement",  "Engagement",   engageVals,                    lb, "#FFCC4E");
  }, 50);
}

/* ── Label période ── */
function periodLabel(period) {
  if (period <= 4)  return "vs il y a 4 semaines";
  if (period <= 8)  return "vs il y a 8 semaines";
  if (period <= 12) return "vs il y a 12 semaines";
  if (period <= 26) return "vs il y a 6 mois";
  return "vs il y a 1 an";
}

/* ── Insights HTML ── */
function insightsHTML(l) {
  const r1 = l["Recherche1"] || ""; const r2 = l["Recherche2"] || ""; const r3 = l["Recherche3"] || "";
  const p1 = l["Page1"] || "";      const p2 = l["Page2"] || "";      const p3 = l["Page3"] || "";

  const recherches = [r1, r2, r3].filter(x => x && x !== "0");
  const pages      = [p1, p2, p3].filter(x => x && x !== "0");

  const liRecherches = recherches.length
    ? recherches.map((r, i) => `<li><span class="insights-num">${i+1}</span>${r}</li>`).join("")
    : `<li class="insights-empty">Aucune donnée cette semaine</li>`;

  const liPages = pages.length
    ? pages.map((p, i) => `<li><span class="insights-num">${i+1}</span>${p}</li>`).join("")
    : `<li class="insights-empty">Aucune donnée cette semaine</li>`;

  return `<div class="insights-card">
    <div class="insights-title">💡 Insights de la semaine — Site web</div>
    <div class="insights-grid">
      <div class="insights-col">
        <h4>🔍 Recherches qui mènent au site (7 jours)</h4>
        <ul class="insights-list">${liRecherches}</ul>
      </div>
      <div class="insights-col">
        <h4>📄 Pages les plus visitées (7 jours)</h4>
        <ul class="insights-list">${liPages}</ul>
      </div>
    </div>
  </div>`;
}

/* ── Navigation ── */
function renderAll() {
  const period = parseInt(document.getElementById("periodSelect").value);

  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  if      (currentTab === "all")        renderAll_Overview(period);
  else if (currentTab === "newsletter") renderAll_Newsletter(period);
  else if (currentTab === "linkedin")   renderAll_LinkedIn(period);
  else if (currentTab === "website")    renderAll_Website(period);
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  renderAll();
  document.getElementById("aiOutput").textContent = "Clique sur un bouton pour analyser ce canal.";
}

/* ── Analyse IA ── */
function getCurrentMetrics() {
  if (!rows.length) return "";
  const l = rows[rows.length-1];
  const p = rows.length>1 ? rows[rows.length-2] : l;
  const map = {
    all:        [["Portée totale", parseInt(l["Impressions"]||0)+parseInt(l["Visiteurs"]||0)+parseInt(l["Abonnées"]||0)],
                 ["Croissance audience", parseInt(l["Croiss. nette"]||0)+parseInt(l["Abonnés"]||0)],
                 ["Engagement", parseInt(l["Réactions"]||0)+parseInt(l["Clics"]||0)]],
    newsletter: [["Abonnées", l["Abonnées"]], ["Croiss. nette", l["Croiss. nette"]]],
    linkedin:   [["Impressions", l["Impressions"]], ["Réactions", l["Réactions"]], ["Abonnés", l["Abonnés"]], ["Clics", l["Clics"]]],
    website:    [["Visiteurs", l["Visiteurs"]], ["Sessions", l["Sessions"]], ["Pages vues", l["Pages vues"]]],
  };
  return (map[currentTab] || []).map(([k,v]) => `${k}: ${n(v)}`).join(", ");
}

async function analyzeKPIs(type) {
  if (!geminiKey) { document.getElementById("aiOutput").textContent = "⚠️ Enregistre d'abord ta clé API Gemini."; return; }
  const metrics  = getCurrentMetrics();
  const tabLabel = { all: "vue d'ensemble", newsletter: "infolettre", linkedin: "LinkedIn", website: "site web" }[currentTab];
  const prompts  = {
    résume:          `Tu es analyste marketing pour le Réseau Santé Numérique (RSN). Résume en 3 phrases la performance de ce canal (${tabLabel}) : ${metrics}.`,
    anomalie:        `Tu es analyste marketing pour le RSN. Identifie toute anomalie préoccupante dans ces KPI (${tabLabel}) : ${metrics}.`,
    recommandations: `Tu es stratège marketing pour le RSN. Donne 3 recommandations concrètes pour améliorer ce canal (${tabLabel}) : ${metrics}.`,
    objectifs:       `Tu es coach marketing pour le RSN. Propose des objectifs SMART pour le prochain mois pour ce canal (${tabLabel}) : ${metrics}.`,
  };
  const out = document.getElementById("aiOutput");
  const spinner = document.getElementById("aiSpinner");
  const btns = document.querySelectorAll(".ai-btn");
  out.textContent = "";
  spinner.style.display = "inline-block";
  btns.forEach(b => b.disabled = true);
  try {
    const res  = await fetch("https://openrouter.ai/api/v1/chat/completions",
      { method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + geminiKey },
        body: JSON.stringify({
          model: "meta-llama/llama-3.3-8b-instruct:free",
          messages: [{ role: "user", content: prompts[type] }]
        }) });
    const data = await res.json();
    spinner.style.display = "none";
    btns.forEach(b => b.disabled = false);
    if (data.error) { out.textContent = "Erreur : " + data.error.message; return; }
    out.textContent = data.choices?.[0]?.message?.content || "Aucune réponse.";
  } catch(e) {
    spinner.style.display = "none";
    btns.forEach(b => b.disabled = false);
    out.textContent = "Erreur de connexion.";
  }
}
